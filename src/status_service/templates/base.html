<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>{% block title %}YourBot Status{% endblock %}</title>
  <meta name="description" content="Real-time status of the YourBot platform — measured from outside, hosted independently."/>
  <meta name="theme-color" content="#07080d"/>
  <link rel="icon" href="/static/favicon.ico?v=3" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=3"/>
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=3"/>
  <link rel="alternate" type="application/rss+xml" title="YourBot Status" href="/feed.xml"/>
  <link rel="stylesheet" href="/static/status.css?v=6"/>
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
